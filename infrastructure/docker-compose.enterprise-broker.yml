# ============================================================================
# Enterprise Pact Broker - Production-Grade Docker Compose
# ============================================================================
#
# This is the CENTRAL Pact Broker that all teams (consumers + provider) share.
# In a real enterprise:
#   - This runs on a dedicated VM / Kubernetes cluster / AWS ECS
#   - It has a persistent PostgreSQL database (RDS, Cloud SQL, etc.)
#   - It's accessible at a stable URL like https://pact-broker.mycompany.com
#   - TLS is terminated at the load balancer / reverse proxy (Nginx shown here)
#   - Credentials are managed via secrets manager (Vault, AWS SSM, etc.)
#
# For this demo, everything runs locally via Docker Compose and is
# reachable at http://localhost:9292 (or https://localhost:443 via Nginx).
#
# Usage:
#   cd infrastructure
#   docker-compose -f docker-compose.enterprise-broker.yml up -d
#
# Persistent data is stored in named Docker volumes.
# ============================================================================

version: "3.8"

services:
  # ==========================================================================
  # PostgreSQL — Persistent contract storage
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: niop-pact-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pact_broker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pact_broker_password}
      POSTGRES_DB: ${POSTGRES_DB:-pact_broker}
    volumes:
      - pact-postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pact_broker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pact-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ==========================================================================
  # Pact Broker — Central contract repository
  # ==========================================================================
  pact-broker:
    image: pactfoundation/pact-broker:latest
    container_name: niop-pact-broker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- Database ---
      PACT_BROKER_DATABASE_URL: "postgres://${POSTGRES_USER:-pact_broker}:${POSTGRES_PASSWORD:-pact_broker_password}@postgres:5432/${POSTGRES_DB:-pact_broker}"

      # --- Broker config ---
      PACT_BROKER_PORT: "9292"
      PACT_BROKER_LOG_LEVEL: "${PACT_BROKER_LOG_LEVEL:-INFO}"

      # --- Authentication ---
      # In production, use an API token or OAuth2 via a reverse proxy.
      # Basic auth is shown here for simplicity.
      PACT_BROKER_BASIC_AUTH_USERNAME: "${PACT_BROKER_AUTH_USERNAME:-pact_user}"
      PACT_BROKER_BASIC_AUTH_PASSWORD: "${PACT_BROKER_AUTH_PASSWORD:-pact_password}"
      PACT_BROKER_ALLOW_PUBLIC_READ: "false"

      # --- Webhooks ---
      PACT_BROKER_WEBHOOK_SCHEME_WHITELIST: "http https"
      PACT_BROKER_WEBHOOK_HOST_WHITELIST: "github.com api.github.com"

      # --- Base URL (set to your real hostname in production) ---
      PACT_BROKER_BASE_URL: "${PACT_BROKER_BASE_URL:-http://localhost:9292}"

      # --- Safety ---
      PACT_BROKER_CHECK_FOR_POTENTIAL_DUPLICATE_PACTICIPANT_NAMES: "true"
      PACT_BROKER_DISABLE_SSL_VERIFICATION: "false"
    ports:
      - "${PACT_BROKER_PORT:-9292}:9292"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9292/diagnostic/status/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pact-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ==========================================================================
  # Nginx reverse proxy — TLS termination (optional but enterprise-standard)
  # ==========================================================================
  # Uncomment this block and provide certs to enable HTTPS.
  # In production, use a real CA cert or Let's Encrypt.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: niop-pact-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     pact-broker:
  #       condition: service_healthy
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   networks:
  #     - pact-network

volumes:
  pact-postgres-data:
    driver: local
    name: niop-pact-postgres-data

networks:
  pact-network:
    driver: bridge
    name: niop-pact-network
