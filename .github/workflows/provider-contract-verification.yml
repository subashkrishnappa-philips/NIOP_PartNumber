# ============================================================================
# Provider Contract Verification Pipeline
# ============================================================================
#
# This pipeline lives in the PROVIDER repository (NIOP_PartNumberEndpoints).
# It verifies the provider against consumer-generated pact files fetched from
# the Pact Broker. Consumers (e.g. PCAW) publish their pacts to the broker;
# this pipeline pulls those pacts and replays every interaction against the
# provider to ensure compatibility.
#
# IMPORTANT: Pact Broker credentials MUST be configured as repository secrets:
#   - PACT_BROKER_BASE_URL  (required)
#   - PACT_BROKER_TOKEN     (recommended, for PactFlow/SaaS)
#   - or PACT_BROKER_USERNAME / PACT_BROKER_PASSWORD (for self-hosted)
#
# Triggered by:
#   1. Push/PR to provider code     -> verify latest consumer pacts from broker
#   2. Pact Broker WEBHOOK          -> a consumer published a new/changed pact
#   3. Manual dispatch              -> on-demand verification
#
# Flow:
#   1. Build the provider API
#   2. Validate Pact Broker credentials are present
#   3. Fetch ALL consumer-generated pacts from the Pact Broker
#   4. Spin up the provider, replay each consumer's pact interactions
#   5. Publish verification results BACK to the Pact Broker
#   6. can-i-deploy check
#   7. Record deployment (on main branch merge)
# ============================================================================

name: "Provider: Contract Verification"

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/Provider/**'
      - '.github/workflows/provider-contract-verification.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/Provider/**'

  repository_dispatch:
    types: [pact-changed]

  workflow_dispatch:
    inputs:
      pact_url:
        description: 'Specific pact URL to verify (optional)'
        required: false
        type: string

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  # ==========================================================================
  # Phase 1: Verify Provider against consumer-generated pacts from Pact Broker
  # ==========================================================================
  verify-provider:
    name: "Verify Provider Against Consumer Pacts (Broker)"
    runs-on: ubuntu-latest
    outputs:
      verification-result: ${{ steps.run-tests.outcome }}

    steps:
      - name: Checkout provider code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/Provider/NIOP.Provider.ContractTests/NIOP.Provider.ContractTests.csproj

      - name: Build provider + tests
        run: dotnet build src/Provider/NIOP.Provider.ContractTests/NIOP.Provider.ContractTests.csproj --no-restore --configuration Release

      # ----------------------------------------------------------------
      # Validate Pact Broker credentials early — both Swagger validation
      # and Pact verification need pact files fetched from the Broker.
      # ----------------------------------------------------------------
      - name: Validate Pact Broker credentials
        id: broker-auth
        run: |
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            echo "method=token" >> $GITHUB_OUTPUT
            echo "Using token-based Pact Broker authentication"
          elif [ -n "${{ secrets.PACT_BROKER_USERNAME }}" ]; then
            echo "method=basic" >> $GITHUB_OUTPUT
            echo "Using basic auth Pact Broker authentication"
          else
            echo "::error::Pact Broker credentials are required in CI. Set PACT_BROKER_TOKEN (recommended) or PACT_BROKER_USERNAME/PACT_BROKER_PASSWORD secrets."
            echo "::error::Consumer-generated pact files must be fetched from the Pact Broker. See docs/PACT_BROKER_GUIDE.md."
            exit 1
          fi

          if [ -z "${{ secrets.PACT_BROKER_BASE_URL }}" ]; then
            echo "::error::PACT_BROKER_BASE_URL secret is required. Set it to the URL of your Pact Broker instance."
            exit 1
          fi
          echo "Pact Broker URL configured — will fetch consumer-generated pacts from broker"

      # ----------------------------------------------------------------
      # Download pact files from the Pact Broker into the local pacts/
      # directory so the Swagger validator can read them from disk.
      # Uses jq (pre-installed on GitHub-hosted runners) to parse the
      # Pact Broker HAL response. Fails loudly if no pacts are found.
      # ----------------------------------------------------------------
      - name: "Download pact files from Pact Broker"
        id: download-pacts
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p pacts

          BROKER_URL="${PACT_BROKER_BASE_URL}"
          PROVIDER="NIOP-Beat-Inventory-Api"

          # Build auth header
          if [ -n "${PACT_BROKER_TOKEN:-}" ]; then
            AUTH_ARGS=(-H "Authorization: Bearer ${PACT_BROKER_TOKEN}")
          else
            AUTH_ARGS=(-u "${PACT_BROKER_USERNAME}:${PACT_BROKER_PASSWORD}")
          fi

          echo "Fetching latest pacts for provider '${PROVIDER}' from ${BROKER_URL}..."

          # The Pact Broker HAL endpoint returns _links.pacts as an array of {href, name, ...}
          # jq handles both array and single-object cases with `[.[]]` normalisation.
          HAL_RESPONSE=$(curl -sf "${AUTH_ARGS[@]}" \
            -H "Accept: application/hal+json" \
            "${BROKER_URL}/pacts/provider/${PROVIDER}/latest")

          PACT_URLS=$(echo "${HAL_RESPONSE}" | \
            jq -r '[ ._links.pacts | if type=="array" then .[] else . end ] | .[].href')

          if [ -z "${PACT_URLS}" ]; then
            echo "::error::No pacts found on the Pact Broker for provider '${PROVIDER}'."
            echo "::error::Ensure the consumer pipeline has run and published pacts to ${BROKER_URL} before the provider pipeline."
            exit 1
          fi

          # Download each pact, naming it {consumer}-{provider}.json
          while IFS= read -r PACT_URL; do
            # Extract consumer name from URL segment: /consumer/{name}/
            CONSUMER=$(echo "${PACT_URL}" | grep -oP '(?<=/consumer/)[^/]+')
            FILENAME="${CONSUMER}-${PROVIDER}.json"
            echo "  Downloading: ${PACT_URL} -> pacts/${FILENAME}"
            curl -sf "${AUTH_ARGS[@]}" "${PACT_URL}" -o "pacts/${FILENAME}"
          done <<< "${PACT_URLS}"

          echo ""
          echo "=== Pact files downloaded ==="
          ls -la pacts/*.json

      # ----------------------------------------------------------------
      # Swagger / OpenAPI Mock Validation
      # Validates that every Pact interaction is compatible with the
      # official OpenAPI spec generated from the provider source code.
      # Pact files were downloaded from the Broker in the previous step.
      # ----------------------------------------------------------------
      - name: "Swagger / OpenAPI Mock Validation"
        id: swagger-validation
        run: |
          echo "Validating Pact interactions against the OpenAPI/Swagger specification..."
          dotnet test src/Provider/NIOP.Provider.ContractTests/NIOP.Provider.ContractTests.csproj \
            --configuration Release \
            --no-build \
            --filter "DisplayName~OpenAPI" \
            --logger "trx;LogFileName=swagger-validation-results.trx" \
            --results-directory ./test-results \
            --verbosity normal

      - name: Upload swagger validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swagger-validation-results
          path: ./test-results/swagger-validation-results.trx
          retention-days: 30

      # ----------------------------------------------------------------
      # Verify consumer-generated pacts fetched from the Pact Broker.
      # The consumer project publishes its pact files to the broker;
      # this step pulls them and replays every interaction against the
      # running provider to ensure compatibility.
      # ----------------------------------------------------------------
      - name: "Verify consumer pacts from Pact Broker"
        id: run-tests
        env:
          # Pact Broker connection — consumer pacts are fetched from here
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
          # Provider identification for result publication
          PROVIDER_VERSION: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          PACT_URL: ${{ github.event.inputs.pact_url || github.event.client_payload.pact_url || '' }}
          # Ensure CI mode — prevents fallback to local pact files
          CI: true
        run: |
          echo "Fetching consumer-generated pact files from Pact Broker and verifying against provider..."
          dotnet test src/Provider/NIOP.Provider.ContractTests/NIOP.Provider.ContractTests.csproj \
            --configuration Release \
            --no-build \
            --filter "DisplayName!~OpenAPI" \
            --logger "trx;LogFileName=provider-verification-results.trx" \
            --results-directory ./test-results \
            --verbosity normal

      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-verification-results
          path: ./test-results/
          retention-days: 30

  # ==========================================================================
  # Phase 2: Can-I-Deploy check
  # ==========================================================================
  can-i-deploy:
    name: "Can Provider Deploy?"
    runs-on: ubuntu-latest
    needs: verify-provider
    # Run on direct pushes to main/develop AND on pull requests targeting those branches.
    if: needs.verify-provider.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')))
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "target=production" >> $GITHUB_OUTPUT
          else
            echo "target=staging" >> $GITHUB_OUTPUT
          fi

      - name: Ensure Pact Broker environments exist
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          set -euo pipefail

          BROKER_URL="${PACT_BROKER_BASE_URL}"

          # Build curl auth args
          if [ -n "${PACT_BROKER_TOKEN:-}" ]; then
            CURL_AUTH=(-H "Authorization: Bearer ${PACT_BROKER_TOKEN}")
          else
            CURL_AUTH=(-u "${PACT_BROKER_USERNAME}:${PACT_BROKER_PASSWORD}")
          fi

          create_environment() {
            local name="$1"
            local is_production="$2"
            local display_name="$3"

            echo "Ensuring '${name}' environment exists..."
            HTTP_STATUS=$(curl -s -o /tmp/env_response.json -w "%{http_code}" \
              -X POST "${BROKER_URL}/environments" \
              "${CURL_AUTH[@]}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${name}\",\"displayName\":\"${display_name}\",\"production\":${is_production}}")

            case "$HTTP_STATUS" in
              200|201)
                echo "  Created '${name}' environment (HTTP ${HTTP_STATUS})"
                ;;
              409|422|400)
                # 409 = already exists, 422/400 can also mean duplicate on some broker versions
                echo "  '${name}' environment already exists (HTTP ${HTTP_STATUS}) — OK"
                ;;
              *)
                echo "  ERROR: Unexpected HTTP ${HTTP_STATUS} when creating '${name}' environment"
                cat /tmp/env_response.json || true
                exit 1
                ;;
            esac
          }

          create_environment "production" "true"  "Production"
          create_environment "staging"    "false" "Staging"

      - name: "Can NIOP-Beat-Inventory-Api deploy?"
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH_FLAGS=""
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            AUTH_FLAGS="--broker-token=${{ secrets.PACT_BROKER_TOKEN }}"
          else
            AUTH_FLAGS="--broker-username=${{ secrets.PACT_BROKER_USERNAME }} --broker-password=${{ secrets.PACT_BROKER_PASSWORD }}"
          fi

          pact-broker can-i-deploy \
            --pacticipant="NIOP-Beat-Inventory-Api" \
            --version="${{ github.sha }}" \
            --to-environment="${{ steps.env.outputs.target }}" \
            --broker-base-url="$BROKER_URL" \
            $AUTH_FLAGS \
            --retry-while-unknown=12 \
            --retry-interval=10

  # ==========================================================================
  # Phase 3: Deploy Provider
  # ==========================================================================
  deploy-provider:
    name: "Deploy Provider"
    runs-on: ubuntu-latest
    needs: can-i-deploy
    # Only deploy on a direct push/merge to main (not on PRs).
    # GitHub auto-skips this if can-i-deploy failed or was skipped.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout provider code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build release artifact
        run: |
          dotnet publish src/Provider/NIOP.Provider.Api/NIOP.Provider.Api.csproj \
            --configuration Release \
            --output ./publish

      - name: Deploy to production
        run: |
          echo "Deploying NIOP-Beat-Inventory-Api version ${{ github.sha }} to production"

  # ==========================================================================
  # Phase 4: Record deployment in Pact Broker
  # ==========================================================================
  record-deployment:
    name: "Record Provider Deployment"
    runs-on: ubuntu-latest
    needs: deploy-provider
    # Only record deployment after a real deploy on main (not on PRs).
    # GitHub auto-skips this if deploy-provider failed or was skipped.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Record provider deployment to production
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH_FLAGS=""
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            AUTH_FLAGS="--broker-token=${{ secrets.PACT_BROKER_TOKEN }}"
          else
            AUTH_FLAGS="--broker-username=${{ secrets.PACT_BROKER_USERNAME }} --broker-password=${{ secrets.PACT_BROKER_PASSWORD }}"
          fi

          pact-broker record-deployment \
            --pacticipant="NIOP-Beat-Inventory-Api" \
            --version="${{ github.sha }}" \
            --environment="production" \
            --broker-base-url="$BROKER_URL" \
            $AUTH_FLAGS

  # ==========================================================================
  # Failure notification
  # ==========================================================================
  notify-failure:
    name: "Contract Failure Report"
    runs-on: ubuntu-latest
    needs: verify-provider
    if: failure()
    steps:
      - name: Generate failure summary
        run: |
          echo "## Provider Contract Verification FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Provider:** NIOP-Beat-Inventory-Api" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Possible causes" >> $GITHUB_STEP_SUMMARY
          echo "- Pact contract mismatch (check provider-verification-results artifact)" >> $GITHUB_STEP_SUMMARY
          echo "- Swagger/OpenAPI schema mismatch (check swagger-validation-results artifact)" >> $GITHUB_STEP_SUMMARY
          echo "- Pact Broker credentials missing or invalid" >> $GITHUB_STEP_SUMMARY
