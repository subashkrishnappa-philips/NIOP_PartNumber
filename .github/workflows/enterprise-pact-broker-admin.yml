# ============================================================================
# ENTERPRISE: Pact Broker Administration
# ============================================================================
#
# One-time (or rare) setup workflow for the shared Pact Broker.
# Run this manually to:
#   - Register all pacticipants (consumers + provider)
#   - Create environments (development, staging, production)
#   - Create/update webhooks (trigger provider verification on pact change)
#   - List or delete webhooks
#
# In a real enterprise, this is run by the platform/DevOps team
# that owns the Pact Broker infrastructure.
#
# GitHub Secrets required:
#   - PACT_BROKER_BASE_URL
#   - PACT_BROKER_USERNAME / PACT_BROKER_PASSWORD  (or PACT_BROKER_TOKEN)
#   - GITHUB_PAT (Personal Access Token with repo dispatch permission)
# ============================================================================

name: "Enterprise: Pact Broker Admin"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - bootstrap-all
          - create-webhook
          - list-webhooks
          - delete-all-webhooks
          - list-pacticipants
          - list-environments

jobs:
  admin:
    name: "Pact Broker Admin — ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Set auth flags
        id: auth
        run: |
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            echo 'flags=--broker-token=${{ secrets.PACT_BROKER_TOKEN }}' >> $GITHUB_OUTPUT
          else
            echo 'flags=--broker-username=${{ secrets.PACT_BROKER_USERNAME }} --broker-password=${{ secrets.PACT_BROKER_PASSWORD }}' >> $GITHUB_OUTPUT
          fi

      # =====================================================================
      # BOOTSTRAP: Register all pacticipants, environments, and webhook
      # =====================================================================
      - name: "Bootstrap: Create environments"
        if: github.event.inputs.action == 'bootstrap-all'
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH="${{ steps.auth.outputs.flags }}"

          echo "Creating environments..."
          for env_name in development staging production; do
            echo "  Creating environment: $env_name"
            pact-broker create-environment \
              --name="$env_name" \
              --broker-base-url="$BROKER_URL" \
              $AUTH || echo "  (already exists)"
          done

      - name: "Bootstrap: Register provider"
        if: github.event.inputs.action == 'bootstrap-all'
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH="${{ steps.auth.outputs.flags }}"

          echo "Registering provider: NIOP-Beat-Inventory-Api"
          pact-broker create-or-update-pacticipant \
            --name="NIOP-Beat-Inventory-Api" \
            --repository-url="https://github.com/${{ github.repository }}" \
            --main-branch="main" \
            --broker-base-url="$BROKER_URL" \
            $AUTH || true

      - name: "Bootstrap: Register all consumers"
        if: github.event.inputs.action == 'bootstrap-all'
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH="${{ steps.auth.outputs.flags }}"

          CONSUMERS=("Salesforce-Consumer" "PCAW-Consumer" "Soraian-Consumer" "MSA-Consumer" "INR-Consumer" "ATS-Consumer" "Cardiologs-Consumer" "EMR-Consumer")

          for consumer in "${CONSUMERS[@]}"; do
            echo "Registering consumer: $consumer"
            pact-broker create-or-update-pacticipant \
              --name="$consumer" \
              --main-branch="main" \
              --broker-base-url="$BROKER_URL" \
              $AUTH || true
          done

      - name: "Bootstrap: Create webhook → provider verification"
        if: github.event.inputs.action == 'bootstrap-all' || github.event.inputs.action == 'create-webhook'
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH="${{ steps.auth.outputs.flags }}"

          # This webhook tells GitHub to trigger the provider verification
          # workflow whenever a consumer publishes a new or changed pact.
          echo "Creating/updating Pact Broker webhook..."
          pact-broker create-or-update-webhook \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            --uuid "niop-provider-verification-webhook" \
            --request=POST \
            --header "Content-Type: application/json" \
            --header "Accept: application/vnd.github.v3+json" \
            --header "Authorization: Bearer ${{ secrets.GITHUB_PAT }}" \
            --data '{
              "event_type": "pact-changed",
              "client_payload": {
                "pact_url": "${pactbroker.pactUrl}",
                "consumer_name": "${pactbroker.consumerName}",
                "provider_name": "${pactbroker.providerName}",
                "consumer_version_number": "${pactbroker.consumerVersionNumber}",
                "provider_version_branch": "${pactbroker.providerVersionBranch}"
              }
            }' \
            --provider="NIOP-Beat-Inventory-Api" \
            --contract-content-changed \
            --broker-base-url="$BROKER_URL" \
            $AUTH \
            --description "Trigger provider verification when any consumer pact changes"

          echo "Webhook created successfully."

      # =====================================================================
      # LIST operations
      # =====================================================================
      - name: "List webhooks"
        if: github.event.inputs.action == 'list-webhooks' || github.event.inputs.action == 'bootstrap-all'
        run: |
          pact-broker list-webhooks \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            ${{ steps.auth.outputs.flags }}

      - name: "List pacticipants"
        if: github.event.inputs.action == 'list-pacticipants' || github.event.inputs.action == 'bootstrap-all'
        run: |
          curl -sf -H "Accept: application/hal+json" \
            -u "${{ secrets.PACT_BROKER_USERNAME }}:${{ secrets.PACT_BROKER_PASSWORD }}" \
            "${{ secrets.PACT_BROKER_BASE_URL }}/pacticipants" | python3 -m json.tool

      - name: "List environments"
        if: github.event.inputs.action == 'list-environments' || github.event.inputs.action == 'bootstrap-all'
        run: |
          curl -sf -H "Accept: application/hal+json" \
            -u "${{ secrets.PACT_BROKER_USERNAME }}:${{ secrets.PACT_BROKER_PASSWORD }}" \
            "${{ secrets.PACT_BROKER_BASE_URL }}/environments" | python3 -m json.tool

      # =====================================================================
      # DELETE operations
      # =====================================================================
      - name: "Delete all webhooks"
        if: github.event.inputs.action == 'delete-all-webhooks'
        run: |
          echo "WARNING: Deleting all webhooks from Pact Broker..."
          # List and delete each webhook
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          WEBHOOK_URLS=$(curl -sf \
            -u "${{ secrets.PACT_BROKER_USERNAME }}:${{ secrets.PACT_BROKER_PASSWORD }}" \
            "$BROKER_URL/webhooks" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for wh in data.get('_embedded', {}).get('webhooks', []):
              links = wh.get('_links', {}).get('self', {})
              if 'href' in links:
                  print(links['href'])
          ")

          for url in $WEBHOOK_URLS; do
            echo "Deleting webhook: $url"
            curl -sf -X DELETE \
              -u "${{ secrets.PACT_BROKER_USERNAME }}:${{ secrets.PACT_BROKER_PASSWORD }}" \
              "$url" || true
          done
          echo "All webhooks deleted."

      - name: Summary
        run: |
          echo "## Pact Broker Admin — ${{ github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Broker URL: \`${{ secrets.PACT_BROKER_BASE_URL }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Action performed: **${{ github.event.inputs.action }}**" >> $GITHUB_STEP_SUMMARY
