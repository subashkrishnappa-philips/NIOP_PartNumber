# ============================================================================
# GitHub Actions: End-to-End Contract Verification via Pact Broker
# ============================================================================
#
# This workflow demonstrates the COMPLETE enterprise Pact Broker flow:
#
#   1. Pact Broker starts (PostgreSQL + Broker as service containers)
#   2. Build the entire solution
#   3. Run ALL 8 consumer test suites → generate pact JSON files
#   4. Publish consumer pacts to the Pact Broker
#   5. Verify pacts are stored in the broker (query the API)
#   6. Provider verification: fetch pacts FROM the broker, verify each
#   7. Publish verification results BACK to the broker
#   8. can-i-deploy check
#   9. Report pass/fail with GitHub Step Summary
#
# The Pact Broker runs as a service container for the ENTIRE job,
# simulating a persistent enterprise broker. All steps share the
# same broker instance (same PostgreSQL database).
#
# EXPECTED RESULT: Provider verification FAILS.
# REASON: Consumer pacts send { SerialNumber, NewPartNumber, Username }
#         but the provider now requires { SerialNumber, NewPartNumber, Username, Org }.
#
# Triggers: push/PR on src/**, or manual dispatch.
# ============================================================================

name: "Pact Broker E2E — Contract Verification"

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pacts/**'
      - '.github/workflows/pact-broker-contract-verification.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PACT_BROKER_BASE_URL: 'http://localhost:9292'
  PACT_BROKER_USERNAME: 'pact_user'
  PACT_BROKER_PASSWORD: 'pact_password'

jobs:
  # ==========================================================================
  # Single job — Pact Broker persists across ALL steps
  # ==========================================================================
  pact-broker-e2e:
    name: "Pact Broker E2E Verification"
    runs-on: ubuntu-latest

    # -----------------------------------------------------------------------
    # Service containers: PostgreSQL + Pact Broker
    # These stay alive for the ENTIRE job (all steps share the same DB).
    # This simulates a persistent enterprise Pact Broker.
    # -----------------------------------------------------------------------
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pact_broker
          POSTGRES_PASSWORD: pact_broker_password
          POSTGRES_DB: pact_broker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pact_broker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      pact-broker:
        image: pactfoundation/pact-broker:latest
        env:
          PACT_BROKER_DATABASE_URL: "postgres://pact_broker:pact_broker_password@postgres:5432/pact_broker"
          PACT_BROKER_PORT: "9292"
          PACT_BROKER_LOG_LEVEL: "INFO"
          PACT_BROKER_BASIC_AUTH_USERNAME: "pact_user"
          PACT_BROKER_BASIC_AUTH_PASSWORD: "pact_password"
          PACT_BROKER_ALLOW_PUBLIC_READ: "true"
          PACT_BROKER_BASE_URL: "http://localhost:9292"
        ports:
          - 9292:9292
        options: >-
          --health-cmd "wget -q --spider http://localhost:9292/diagnostic/status/heartbeat || exit 1"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    steps:
      # =====================================================================
      # SETUP
      # =====================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Wait for Pact Broker to be ready
        run: |
          echo "============================================="
          echo "  Waiting for Pact Broker..."
          echo "============================================="
          for i in $(seq 1 30); do
            if curl -sf -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
                 "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" > /dev/null 2>&1; then
              echo "Pact Broker is ready at $PACT_BROKER_BASE_URL"
              break
            fi
            echo "  Attempt $i/30 — waiting 3s..."
            sleep 3
          done

      # =====================================================================
      # STEP 1: Bootstrap the Pact Broker (like enterprise admin would)
      # =====================================================================
      - name: "Step 1: Bootstrap Pact Broker (environments + pacticipants)"
        run: |
          echo "============================================="
          echo "  Step 1: Bootstrap Pact Broker"
          echo "============================================="
          echo ""

          # Create environments
          echo "Creating environments..."
          for env_name in development staging production; do
            pact-broker create-environment \
              --name="$env_name" \
              --broker-base-url="$PACT_BROKER_BASE_URL" \
              --broker-username="$PACT_BROKER_USERNAME" \
              --broker-password="$PACT_BROKER_PASSWORD" 2>/dev/null || echo "  $env_name (already exists)"
          done

          # Register provider
          echo ""
          echo "Registering provider: NIOP-Beat-Inventory-Api"
          pact-broker create-or-update-pacticipant \
            --name="NIOP-Beat-Inventory-Api" \
            --main-branch="main" \
            --broker-base-url="$PACT_BROKER_BASE_URL" \
            --broker-username="$PACT_BROKER_USERNAME" \
            --broker-password="$PACT_BROKER_PASSWORD" || true

          # Register consumers
          echo ""
          CONSUMERS=("Salesforce-Consumer" "PCAW-Consumer" "Soraian-Consumer" "MSA-Consumer" "INR-Consumer" "ATS-Consumer" "Cardiologs-Consumer" "EMR-Consumer")
          for consumer in "${CONSUMERS[@]}"; do
            echo "Registering consumer: $consumer"
            pact-broker create-or-update-pacticipant \
              --name="$consumer" \
              --main-branch="main" \
              --broker-base-url="$PACT_BROKER_BASE_URL" \
              --broker-username="$PACT_BROKER_USERNAME" \
              --broker-password="$PACT_BROKER_PASSWORD" || true
          done

          echo ""
          echo "Pact Broker bootstrapped successfully."

      # =====================================================================
      # STEP 2: Build everything
      # =====================================================================
      - name: "Step 2: Build entire solution"
        run: |
          echo "============================================="
          echo "  Step 2: Build Solution"
          echo "============================================="
          dotnet restore NIOP.ContractTesting.sln
          dotnet build NIOP.ContractTesting.sln --no-restore --configuration Release

      # =====================================================================
      # STEP 3: Run ALL consumer tests (generates pact JSON files)
      # =====================================================================
      - name: "Step 3: Run all consumer pact tests"
        run: |
          echo "============================================="
          echo "  Step 3: Consumer Pact Tests"
          echo "============================================="
          echo ""
          echo "Running 8 consumer test suites..."
          echo "Each generates a pact JSON file in ./pacts/"
          echo ""

          CONSUMERS=(
            "src/Consumers/Salesforce/Consumer.Salesforce.ContractTests/Consumer.Salesforce.ContractTests.csproj"
            "src/Consumers/PCAW/Consumer.PCAW.ContractTests/Consumer.PCAW.ContractTests.csproj"
            "src/Consumers/Soraian/Consumer.Soraian.ContractTests/Consumer.Soraian.ContractTests.csproj"
            "src/Consumers/MSA/Consumer.MSA.ContractTests/Consumer.MSA.ContractTests.csproj"
            "src/Consumers/INR/Consumer.INR.ContractTests/Consumer.INR.ContractTests.csproj"
            "src/Consumers/ATS/Consumer.ATS.ContractTests/Consumer.ATS.ContractTests.csproj"
            "src/Consumers/Cardiologs/Consumer.Cardiologs.ContractTests/Consumer.Cardiologs.ContractTests.csproj"
            "src/Consumers/EMR/Consumer.EMR.ContractTests/Consumer.EMR.ContractTests.csproj"
          )

          PASSED=0
          FAILED=0
          for proj in "${CONSUMERS[@]}"; do
            NAME=$(basename $(dirname "$proj"))
            echo "--- Running: $NAME ---"
            if dotnet test "$proj" --configuration Release --no-build --verbosity normal; then
              echo "  PASSED"
              PASSED=$((PASSED + 1))
            else
              echo "  FAILED"
              FAILED=$((FAILED + 1))
            fi
            echo ""
          done

          echo "============================================="
          echo "Consumer tests: $PASSED passed, $FAILED failed"
          echo "============================================="

      - name: "Step 3b: List generated pact files"
        run: |
          echo "=== Generated Pact Files ==="
          ls -la ./pacts/*.json 2>/dev/null || echo "No pact files found!"

      # =====================================================================
      # STEP 4: Publish consumer pacts to the Pact Broker
      # =====================================================================
      - name: "Step 4: Publish consumer pacts to Pact Broker"
        run: |
          echo "============================================="
          echo "  Step 4: Publish Pacts to Broker"
          echo "============================================="
          echo ""

          CONSUMER_VERSION="${{ github.sha }}"
          GIT_BRANCH="${{ github.ref_name }}"

          echo "Broker URL:        $PACT_BROKER_BASE_URL"
          echo "Consumer version:  $CONSUMER_VERSION"
          echo "Branch:            $GIT_BRANCH"
          echo ""

          PUBLISHED=0
          for pact_file in ./pacts/*.json; do
            if [ -f "$pact_file" ]; then
              FILENAME=$(basename "$pact_file")
              echo "Publishing: $FILENAME"
              pact-broker publish "$pact_file" \
                --consumer-app-version="$CONSUMER_VERSION" \
                --branch="$GIT_BRANCH" \
                --broker-base-url="$PACT_BROKER_BASE_URL" \
                --broker-username="$PACT_BROKER_USERNAME" \
                --broker-password="$PACT_BROKER_PASSWORD" \
                --verbose
              PUBLISHED=$((PUBLISHED + 1))
              echo ""
            fi
          done

          echo "============================================="
          echo "Published $PUBLISHED pacts to Pact Broker."
          echo "============================================="

      # =====================================================================
      # STEP 5: Verify pacts are in the broker (query the API)
      # =====================================================================
      - name: "Step 5: Verify pacts stored in Pact Broker"
        run: |
          echo "============================================="
          echo "  Step 5: Query Pact Broker"
          echo "============================================="
          echo ""

          echo "--- Registered Pacticipants ---"
          curl -sf -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
            -H "Accept: application/hal+json" \
            "$PACT_BROKER_BASE_URL/pacticipants" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for p in data.get('_embedded', {}).get('pacticipants', []):
              print(f\"  - {p['name']}\")
          " || true

          echo ""
          echo "--- Latest Pacts for Provider ---"
          curl -sf -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
            -H "Accept: application/hal+json" \
            "$PACT_BROKER_BASE_URL/pacts/provider/NIOP-Beat-Inventory-Api/latest" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for p in data.get('_embedded', {}).get('pacts', []):
              consumer = p.get('_embedded', {}).get('consumer', {}).get('name', 'unknown')
              print(f\"  - {consumer}\")
          " || true

          echo ""
          echo "All 8 consumer pacts are now stored in the Pact Broker's database."

      # =====================================================================
      # STEP 6: Provider verification — fetch pacts FROM the broker
      # =====================================================================
      - name: "Step 6: Provider verification against Pact Broker"
        id: provider-verify
        env:
          PACT_BROKER_BASE_URL: "http://localhost:9292"
          PACT_BROKER_USERNAME: "pact_user"
          PACT_BROKER_PASSWORD: "pact_password"
          PROVIDER_VERSION: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          echo "============================================="
          echo "  Step 6: Provider Verification"
          echo "============================================="
          echo ""
          echo "The provider will:"
          echo "  1. Start a real Kestrel HTTP server"
          echo "  2. Connect to the Pact Broker at $PACT_BROKER_BASE_URL"
          echo "  3. Fetch ALL consumer pacts (8 consumers)"
          echo "  4. Replay each interaction against the provider"
          echo "  5. Publish pass/fail results back to the broker"
          echo ""
          echo "EXPECTED: FAIL (consumers don't send 'Org' field)"
          echo ""

          # Run provider verification — capture exit code
          set +e
          dotnet test src/Provider/NIOP.Provider.ContractTests/NIOP.Provider.ContractTests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=provider-broker-verification.trx" \
            --results-directory ./test-results \
            --verbosity normal
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "Provider verification FAILED (exit code: $EXIT_CODE)"
            echo "verification_result=failed" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "Provider verification PASSED"
            echo "verification_result=passed" >> $GITHUB_OUTPUT
          fi

      # =====================================================================
      # STEP 7: can-i-deploy check
      # =====================================================================
      - name: "Step 7: can-i-deploy check"
        if: always()
        run: |
          echo "============================================="
          echo "  Step 7: Can-I-Deploy Check"
          echo "============================================="
          echo ""

          echo "--- Provider: Can NIOP-Beat-Inventory-Api deploy? ---"
          pact-broker can-i-deploy \
            --pacticipant="NIOP-Beat-Inventory-Api" \
            --version="${{ github.sha }}" \
            --to-environment="production" \
            --broker-base-url="$PACT_BROKER_BASE_URL" \
            --broker-username="$PACT_BROKER_USERNAME" \
            --broker-password="$PACT_BROKER_PASSWORD" 2>&1 || true

          echo ""
          echo "--- Consumers: Can they deploy? ---"
          CONSUMERS=("Salesforce-Consumer" "PCAW-Consumer" "Soraian-Consumer" "MSA-Consumer" "INR-Consumer" "ATS-Consumer" "Cardiologs-Consumer" "EMR-Consumer")
          for consumer in "${CONSUMERS[@]}"; do
            echo ""
            echo "Checking: $consumer"
            pact-broker can-i-deploy \
              --pacticipant="$consumer" \
              --version="${{ github.sha }}" \
              --to-environment="production" \
              --broker-base-url="$PACT_BROKER_BASE_URL" \
              --broker-username="$PACT_BROKER_USERNAME" \
              --broker-password="$PACT_BROKER_PASSWORD" 2>&1 || true
          done

      # =====================================================================
      # STEP 8: Upload artifacts
      # =====================================================================
      - name: "Step 8: Upload test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-broker-e2e-results
          path: ./test-results/
          retention-days: 30

      # =====================================================================
      # STEP 9: Final report
      # =====================================================================
      - name: "Step 9: Generate verification report"
        if: always()
        run: |
          echo ""
          echo "============================================="
          echo "  FINAL REPORT"
          echo "============================================="
          echo ""

          RESULT="${{ steps.provider-verify.outputs.verification_result }}"

          if [ "$RESULT" == "failed" ]; then
            echo "RESULT: PROVIDER VERIFICATION FAILED"
            echo ""
            echo "The provider's new mandatory 'Org' field breaks all 8 consumer contracts."
            echo ""
            echo "What happened:"
            echo "  1. Pact Broker started (PostgreSQL + Broker)"
            echo "  2. 8 consumer tests ran — generated pacts WITHOUT 'Org'"
            echo "  3. Pacts published to broker"
            echo "  4. Provider fetched pacts from broker"
            echo "  5. Provider rejected requests (missing 'Org') — returned 400"
            echo "  6. Pact verification FAILED for all consumers"
            echo ""
            echo "In enterprise: This blocks the provider from deploying."
            echo "Resolution: All 8 consumer teams must add 'Org' to their contracts."

            # GitHub Step Summary
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Pact Broker E2E — Provider Verification FAILED

          ### Flow Executed
          | Step | Description | Result |
          |------|-------------|--------|
          | 1 | Bootstrap Pact Broker (environments, pacticipants) | Passed |
          | 2 | Build solution | Passed |
          | 3 | Run 8 consumer pact tests | Passed |
          | 4 | Publish pacts to Pact Broker | Passed |
          | 5 | Verify pacts stored in broker | Passed |
          | 6 | **Provider verification from broker** | **FAILED** |
          | 7 | can-i-deploy check | Blocked |

          ### Consumer Pact Verification Results
          | Consumer | Pact Published | Provider Verified | Status |
          |----------|---------------|-------------------|--------|
          | Salesforce-Consumer | Yes | No — returned 400 | Failed |
          | PCAW-Consumer | Yes | No — returned 400 | Failed |
          | Soraian-Consumer | Yes | No — returned 400 | Failed |
          | MSA-Consumer | Yes | No — returned 400 | Failed |
          | INR-Consumer | Yes | No — returned 400 | Failed |
          | ATS-Consumer | Yes | No — returned 400 | Failed |
          | Cardiologs-Consumer | Yes | No — returned 400 | Failed |
          | EMR-Consumer | Yes | No — returned 400 | Failed |

          ### Root Cause
          ```
          Consumer pacts send:    { SerialNumber, NewPartNumber, Username }
          Provider now requires:  { SerialNumber, NewPartNumber, Username, Org }
          ```

          The provider added a **mandatory `Org` field**. Consumers don't include it,
          so the provider returns `400 Bad Request` instead of the expected `200 OK`.

          ### Where Are Contracts Stored?
          In this pipeline, contracts are stored in the **Pact Broker's PostgreSQL database**
          (running as a GitHub Actions service container). In a real enterprise, this would be
          a persistent Pact Broker at `https://pact-broker.mycompany.com`.

          ### Resolution
          Each consumer team must:
          1. Update their contract tests to include `"Org": "philips"` in the request body
          2. Re-run consumer tests → new pact files generated
          3. Publish updated pacts to the Pact Broker
          4. Provider re-verifies → passes
          EOF

            exit 1

          else
            echo "RESULT: Provider verification PASSED"
            echo ""
            echo "All consumer contracts are satisfied by the provider."

            echo "## Pact Broker E2E — Provider Verification PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All 8 consumer contracts verified successfully against the provider." >> $GITHUB_STEP_SUMMARY
          fi
