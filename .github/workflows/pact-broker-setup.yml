# ============================================================================
# GitHub Actions: Pact Broker Webhook Setup
# ============================================================================
# Configures Pact Broker webhooks to trigger provider verification 
# when new consumer pacts are published.
#
# Run this workflow once to set up the webhook, or whenever the 
# webhook configuration needs to be updated.
# ============================================================================

name: Setup Pact Broker Webhooks

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create-webhook
          - list-webhooks
          - delete-all-webhooks

env:
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

jobs:
  setup-webhooks:
    name: Configure Pact Broker Webhooks
    runs-on: ubuntu-latest
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Create webhook for provider verification
        if: github.event.inputs.action == 'create-webhook'
        run: |
          pact-broker create-or-update-webhook \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            --uuid "niop-provider-verification-webhook" \
            --request=POST \
            --header "Content-Type: application/json" \
            --header "Accept: application/vnd.github.v3+json" \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --data '{
              "event_type": "pact-changed",
              "client_payload": {
                "pact_url": "${pactbroker.pactUrl}",
                "consumer_name": "${pactbroker.consumerName}",
                "provider_name": "${pactbroker.providerName}"
              }
            }' \
            --provider="NIOP-Beat-Inventory-Api" \
            --contract-content-changed \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}" \
            --description "Trigger provider verification on contract change"

      - name: List existing webhooks
        if: github.event.inputs.action == 'list-webhooks'
        run: |
          pact-broker list-webhooks \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}"

      - name: Register pacticipants
        if: github.event.inputs.action == 'create-webhook'
        run: |
          # Register the provider
          pact-broker create-or-update-pacticipant \
            --name="NIOP-Beat-Inventory-Api" \
            --repository-url="https://github.com/${{ github.repository }}" \
            --main-branch="main" \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}" || true
          
          # Register consumers
          CONSUMERS=("Salesforce-Consumer" "PCAW-Consumer" "Soraian-Consumer" "MSA-Consumer" "INR-Consumer" "ATS-Consumer" "Cardiologs-Consumer" "EMR-Consumer")
          
          for consumer in "${CONSUMERS[@]}"; do
            pact-broker create-or-update-pacticipant \
              --name="$consumer" \
              --main-branch="main" \
              --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
              --broker-token="${{ secrets.PACT_BROKER_TOKEN }}" || true
          done

      - name: Create environments
        if: github.event.inputs.action == 'create-webhook'
        run: |
          # Create standard environments
          for env in development staging production; do
            pact-broker create-environment \
              --name="$env" \
              --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
              --broker-token="${{ secrets.PACT_BROKER_TOKEN }}" || true
          done
