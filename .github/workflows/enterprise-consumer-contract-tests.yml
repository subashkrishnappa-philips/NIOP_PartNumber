# ============================================================================
# ENTERPRISE: Consumer Contract Tests Pipeline
# ============================================================================
#
# In a real enterprise, EACH consumer team owns their own repo and pipeline.
# This single workflow simulates 8 independent consumer teams, all publishing
# contracts to a SHARED, PERSISTENT Pact Broker.
#
# Flow (per consumer):
#   1. Build & run consumer pact tests → generates pact JSON
#   2. Publish pact to Pact Broker (versioned by git SHA + branch)
#   3. can-i-deploy check → is it safe to deploy this consumer?
#   4. Record deployment (on main branch merge)
#
# The Pact Broker is a long-lived service (NOT ephemeral).
# It is referenced via GitHub Secrets:
#   - PACT_BROKER_BASE_URL   (e.g. https://pact-broker.mycompany.com)
#   - PACT_BROKER_USERNAME   (basic auth username)
#   - PACT_BROKER_PASSWORD   (basic auth password)
#   — OR —
#   - PACT_BROKER_TOKEN      (bearer token for PactFlow SaaS)
#
# After publishing, the Pact Broker fires a WEBHOOK to trigger
# the provider-contract-verification workflow (repository_dispatch).
# ============================================================================

name: "Enterprise: Consumer Contract Tests"

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/Consumers/**'
      - 'src/Shared/**'
      - '.github/workflows/enterprise-consumer-contract-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/Consumers/**'
      - 'src/Shared/**'
  workflow_dispatch:
    inputs:
      consumer:
        description: 'Run tests for a specific consumer (or all)'
        required: false
        type: choice
        default: all
        options: [all, Salesforce, PCAW, Soraian, MSA, INR, ATS, Cardiologs, EMR]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  # ==========================================================================
  # Phase 1: Build (shared across all consumers)
  # ==========================================================================
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore NIOP.ContractTesting.sln
      - run: dotnet build NIOP.ContractTesting.sln --no-restore --configuration Release

  # ==========================================================================
  # Phase 2: Run consumer tests in parallel (one per consumer team)
  # ==========================================================================
  consumer-tests:
    name: "PCAW — Pact Tests"
    runs-on: ubuntu-latest
    needs: build
    #strategy:
     # fail-fast: false
      #matrix:
       # consumer:
        #  - { name: "Salesforce", participant: "Salesforce-Consumer", project: "src/Consumers/Salesforce/Consumer.Salesforce.ContractTests/Consumer.Salesforce.ContractTests.csproj" }
         # - { name: "PCAW",       participant: "PCAW-Consumer",       project: "src/Consumers/PCAW/Consumer.PCAW.ContractTests/Consumer.PCAW.ContractTests.csproj" }
          #- { name: "Soraian",    participant: "Soraian-Consumer",    project: "src/Consumers/Soraian/Consumer.Soraian.ContractTests/Consumer.Soraian.ContractTests.csproj" }
          #- { name: "MSA",        participant: "MSA-Consumer",        project: "src/Consumers/MSA/Consumer.MSA.ContractTests/Consumer.MSA.ContractTests.csproj" }
          #- { name: "INR",        participant: "INR-Consumer",        project: "src/Consumers/INR/Consumer.INR.ContractTests/Consumer.INR.ContractTests.csproj" }
          #- { name: "ATS",        participant: "ATS-Consumer",        project: "src/Consumers/ATS/Consumer.ATS.ContractTests/Consumer.ATS.ContractTests.csproj" }
          #- { name: "Cardiologs", participant: "Cardiologs-Consumer", project: "src/Consumers/Cardiologs/Consumer.Cardiologs.ContractTests/Consumer.Cardiologs.ContractTests.csproj" }
          #- { name: "EMR",        participant: "EMR-Consumer",        project: "src/Consumers/EMR/Consumer.EMR.ContractTests/Consumer.EMR.ContractTests.csproj" }
    steps:
      - name: Checkout provider code
        uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

    #   - name: Restore & build
    #     run: |
    #       dotnet restore ${{ matrix.consumer.project }}
    #       dotnet build ${{ matrix.consumer.project }} --no-restore --configuration Release

    #   - name: Run ${{ matrix.consumer.name }} pact tests
    #     run: |
    #       dotnet test ${{ matrix.consumer.project }} \
    #         --configuration Release \
    #         --no-build \
    #         --logger "trx;LogFileName=${{ matrix.consumer.name }}-results.trx" \
    #         --results-directory ./test-results \
    #         --verbosity normal

      - name: Restore, Build, and Test
        run: |
          dotnet test src/Consumers/PCAW/Consumer.PCAW.ContractTests/Consumer.PCAW.ContractTests.csproj --configuration Release --logger "trx;LogFileName=PCAW-results.trx" --results-directory ./test-results --verbosity normal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PCAW-test-results
          path: ./test-results/
          retention-days: 30

      - name: Upload generated pact file
        uses: actions/upload-artifact@v4
        with:
          name: PCAW-pact
          path: ./pacts/PCAW-Consumer-NIOP-Beat-Inventory-Api.json
          retention-days: 30

  # ==========================================================================
  # Phase 3: Publish all pacts to the Pact Broker
  # ==========================================================================
  publish-pacts:
    name: "Publish Pacts to Pact Broker"
    runs-on: ubuntu-latest
    needs: consumer-tests
    steps:
      - uses: actions/checkout@v4

      - name: Download all pact artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-pact"
          path: ./pacts/
          merge-multiple: true

      - name: List pact files
        run: |
          echo "=== Generated Pact Files ==="
          ls -la ./pacts/*.json 2>/dev/null || echo "No pact files found!"

      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Determine broker auth method
        id: broker-auth
        run: |
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            echo "method=token" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.PACT_BROKER_USERNAME }}" ]; then
            echo "method=basic" >> $GITHUB_OUTPUT
          else
            echo "method=none" >> $GITHUB_OUTPUT
            echo "::warning::No Pact Broker credentials configured. Skipping publish."
          fi

      - name: Publish pacts to Pact Broker
        if: steps.broker-auth.outputs.method != 'none'
        run: |
          CONSUMER_VERSION="${{ github.sha }}"
          GIT_BRANCH="${{ github.ref_name }}"
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"

          echo "============================================="
          echo "  Publishing Pacts to Pact Broker"
          echo "============================================="
          echo "Broker URL:        $BROKER_URL"
          echo "Consumer version:  $CONSUMER_VERSION"
          echo "Branch:            $GIT_BRANCH"
          echo "Auth method:       ${{ steps.broker-auth.outputs.method }}"
          echo ""

          # Build auth flags
          AUTH_FLAGS=""
          if [ "${{ steps.broker-auth.outputs.method }}" == "token" ]; then
            AUTH_FLAGS="--broker-token=${{ secrets.PACT_BROKER_TOKEN }}"
          else
            AUTH_FLAGS="--broker-username=${{ secrets.PACT_BROKER_USERNAME }} --broker-password=${{ secrets.PACT_BROKER_PASSWORD }}"
          fi

          for pact_file in ./pacts/*.json; do
            if [ -f "$pact_file" ]; then
              FILENAME=$(basename "$pact_file")
              echo "Publishing: $FILENAME"
              pact-broker publish "$pact_file" \
                --consumer-app-version="$CONSUMER_VERSION" \
                --branch="$GIT_BRANCH" \
                --broker-base-url="$BROKER_URL" \
                $AUTH_FLAGS \
                --tag-with-git-branch \
                --verbose
              echo ""
            fi
          done

          echo "All pacts published successfully."

      # -----------------------------------------------------------------------
      # After publishing, the Pact Broker webhook automatically triggers
      # the provider verification workflow via repository_dispatch.
      # This is configured in the enterprise-pact-broker-admin.yml workflow.
      # -----------------------------------------------------------------------

  # ==========================================================================
  # Phase 4: Can-I-Deploy check (on main/develop only)
  # ==========================================================================
  can-i-deploy:
    name: "${{ matrix.consumer.name }} — Can I Deploy?"
    runs-on: ubuntu-latest
    needs: publish-pacts
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - { name: "Salesforce", participant: "Salesforce-Consumer" }
          - { name: "PCAW",       participant: "PCAW-Consumer" }
          - { name: "Soraian",    participant: "Soraian-Consumer" }
          - { name: "MSA",        participant: "MSA-Consumer" }
          - { name: "INR",        participant: "INR-Consumer" }
          - { name: "ATS",        participant: "ATS-Consumer" }
          - { name: "Cardiologs", participant: "Cardiologs-Consumer" }
          - { name: "EMR",        participant: "EMR-Consumer" }
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Can ${{ matrix.consumer.name }} deploy to production?
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH_FLAGS=""
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            AUTH_FLAGS="--broker-token=${{ secrets.PACT_BROKER_TOKEN }}"
          else
            AUTH_FLAGS="--broker-username=${{ secrets.PACT_BROKER_USERNAME }} --broker-password=${{ secrets.PACT_BROKER_PASSWORD }}"
          fi

          TARGET_ENV="production"
          if [ "${{ github.ref_name }}" == "develop" ]; then
            TARGET_ENV="staging"
          fi

          echo "Checking if ${{ matrix.consumer.participant }} @ ${{ github.sha }} can deploy to $TARGET_ENV..."
          pact-broker can-i-deploy \
            --pacticipant="${{ matrix.consumer.participant }}" \
            --version="${{ github.sha }}" \
            --to-environment="$TARGET_ENV" \
            --broker-base-url="$BROKER_URL" \
            $AUTH_FLAGS \
            --retry-while-unknown=12 \
            --retry-interval=10

  # ==========================================================================
  # Phase 5: Record deployment (main branch only)
  # ==========================================================================
  record-deployment:
    name: "Record Consumer Deployments"
    runs-on: ubuntu-latest
    needs: can-i-deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.2 bash
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Record all consumer deployments to production
        run: |
          BROKER_URL="${{ secrets.PACT_BROKER_BASE_URL }}"
          AUTH_FLAGS=""
          if [ -n "${{ secrets.PACT_BROKER_TOKEN }}" ]; then
            AUTH_FLAGS="--broker-token=${{ secrets.PACT_BROKER_TOKEN }}"
          else
            AUTH_FLAGS="--broker-username=${{ secrets.PACT_BROKER_USERNAME }} --broker-password=${{ secrets.PACT_BROKER_PASSWORD }}"
          fi

          CONSUMERS=("Salesforce-Consumer" "PCAW-Consumer" "Soraian-Consumer" "MSA-Consumer" "INR-Consumer" "ATS-Consumer" "Cardiologs-Consumer" "EMR-Consumer")

          for consumer in "${CONSUMERS[@]}"; do
            echo "Recording deployment: $consumer → production"
            pact-broker record-deployment \
              --pacticipant="$consumer" \
              --version="${{ github.sha }}" \
              --environment="production" \
              --broker-base-url="$BROKER_URL" \
              $AUTH_FLAGS || true
          done
